name: Deploy Cloudflare signaling

on:
  push:
    branches: ["main"]
    paths:
      - "cloudflare-signaling/**"
      - ".github/workflows/cloudflare-signaling.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare-signaling/package-lock.json

      - name: Install dependencies
        working-directory: cloudflare-signaling
        run: npm ci

      - name: Typecheck
        working-directory: cloudflare-signaling
        run: npm run typecheck

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare-signaling
          command: deploy
